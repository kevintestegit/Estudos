<h1>Diagramas e conjuntos</h1>
<ul>
<li>|A∪B| = |A| + |B| − |A∩B|</li>
<li>Todo A é B → A⊂B; Nenhum A é B → interseção vazia</li>
<li>Alguns A são B → interseção não vazia</li>
<li>Cuidado: “todo A é B” não implica “todo B é A”</li>
</ul>
